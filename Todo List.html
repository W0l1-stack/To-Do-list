<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>To Do</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: oklch(0.985 0.005 80);
    --surface: oklch(1 0 0);
    --ink: oklch(0.22 0.01 80);
    --ink-soft: oklch(0.45 0.01 80);
    --ink-muted: oklch(0.65 0.01 80);
    --line: oklch(0.92 0.008 80);
    --line-soft: oklch(0.95 0.006 80);
    --accent: oklch(0.55 0.15 38);
    --accent-soft: oklch(0.95 0.04 38);
    --done: oklch(0.72 0.01 80);
    --danger: oklch(0.6 0.15 25);
    --radius: 10px;
    --shadow: 0 1px 2px oklch(0 0 0 / 0.04), 0 8px 30px oklch(0 0 0 / 0.06);
  }

  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    font-family: 'Inter', system-ui, sans-serif;
    background: var(--bg);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
    display: flex;
    justify-content: center;
    padding: 64px 24px 120px;
  }

  .app {
    width: 100%;
    max-width: 560px;
  }

  header.top {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 32px;
  }
  header.top .title {
    font-size: 28px;
    font-weight: 600;
    letter-spacing: -0.02em;
  }
  header.top .date {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--ink-muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  .stats {
    display: flex;
    gap: 24px;
    margin-bottom: 24px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--line);
  }
  .stat .num {
    font-size: 22px;
    font-weight: 600;
    letter-spacing: -0.01em;
    font-variant-numeric: tabular-nums;
  }
  .stat .lbl {
    font-size: 11px;
    color: var(--ink-muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-top: 2px;
  }
  .stat.accent .num { color: var(--accent); }

  .composer {
    display: flex;
    gap: 8px;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 6px;
    box-shadow: var(--shadow);
    margin-bottom: 24px;
    transition: border-color 0.15s ease, box-shadow 0.15s ease;
  }
  .composer:focus-within {
    border-color: var(--ink-soft);
  }
  .composer input {
    flex: 1;
    border: 0;
    background: transparent;
    padding: 10px 12px;
    font: inherit;
    font-size: 15px;
    color: var(--ink);
    outline: none;
  }
  .composer input::placeholder { color: var(--ink-muted); }
  .composer button {
    border: 0;
    background: var(--ink);
    color: var(--surface);
    font: inherit;
    font-size: 14px;
    font-weight: 500;
    padding: 8px 16px;
    border-radius: 7px;
    cursor: pointer;
    transition: background 0.15s ease, transform 0.05s ease;
  }
  .composer button:hover { background: oklch(0.32 0.01 80); }
  .composer button:active { transform: scale(0.97); }

  .filters {
    display: flex;
    gap: 4px;
    margin-bottom: 12px;
  }
  .filters button {
    border: 0;
    background: transparent;
    font: inherit;
    font-size: 13px;
    color: var(--ink-muted);
    padding: 6px 10px;
    border-radius: 6px;
    cursor: pointer;
    transition: background 0.15s ease, color 0.15s ease;
  }
  .filters button:hover { color: var(--ink); }
  .filters button.active {
    background: var(--ink);
    color: var(--surface);
  }
  .filters .spacer { flex: 1; }
  .filters .clear {
    color: var(--ink-muted);
    font-size: 12px;
  }
  .filters .clear:hover { color: var(--danger); }

  ul.list {
    list-style: none;
    padding: 0;
    margin: 0;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    overflow: hidden;
  }

  li.task {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 16px;
    border-bottom: 1px solid var(--line-soft);
    transition: background 0.12s ease;
  }
  li.task:last-child { border-bottom: 0; }
  li.task:hover { background: oklch(0.985 0.005 80); }

  li.task .check {
    appearance: none;
    width: 18px;
    height: 18px;
    border: 1.5px solid var(--ink-muted);
    border-radius: 50%;
    margin: 0;
    cursor: pointer;
    flex-shrink: 0;
    display: grid;
    place-items: center;
    transition: border-color 0.15s ease, background 0.15s ease;
  }
  li.task .check:hover { border-color: var(--accent); }
  li.task .check:checked {
    background: var(--accent);
    border-color: var(--accent);
  }
  li.task .check:checked::after {
    content: '';
    width: 8px;
    height: 4px;
    border-left: 1.5px solid white;
    border-bottom: 1.5px solid white;
    transform: translateY(-1px) rotate(-45deg);
  }

  li.task .text {
    flex: 1;
    font-size: 15px;
    line-height: 1.4;
    color: var(--ink);
    outline: none;
    word-break: break-word;
  }
  li.task.done .text {
    color: var(--done);
    text-decoration: line-through;
    text-decoration-thickness: 1px;
  }

  li.task .meta {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--ink-muted);
    letter-spacing: 0.04em;
    white-space: nowrap;
  }

  li.task .delete {
    border: 0;
    background: transparent;
    color: var(--ink-muted);
    cursor: pointer;
    width: 24px;
    height: 24px;
    border-radius: 6px;
    display: grid;
    place-items: center;
    opacity: 0;
    transition: opacity 0.15s ease, background 0.15s ease, color 0.15s ease;
  }
  li.task:hover .delete { opacity: 1; }
  li.task .delete:hover {
    background: oklch(0.95 0.03 25);
    color: var(--danger);
  }

  .empty {
    padding: 48px 24px;
    text-align: center;
    color: var(--ink-muted);
  }
  .empty .glyph {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 8px;
    opacity: 0.6;
  }
  .empty .msg {
    font-size: 14px;
  }

  .hint {
    margin-top: 16px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--ink-muted);
    text-align: center;
    letter-spacing: 0.04em;
  }
  kbd {
    font-family: inherit;
    background: var(--surface);
    border: 1px solid var(--line);
    border-bottom-width: 2px;
    border-radius: 4px;
    padding: 1px 5px;
    font-size: 10px;
    color: var(--ink-soft);
  }
</style>
</head>
<body>
  <main class="app">
    <header class="top">
      <div class="title">To do</div>
      <div class="date" id="today">—</div>
    </header>

    <section class="stats" aria-label="Summary">
      <div class="stat">
        <div class="num" id="stat-total">0</div>
        <div class="lbl">Total</div>
      </div>
      <div class="stat accent">
        <div class="num" id="stat-open">0</div>
        <div class="lbl">Open</div>
      </div>
      <div class="stat">
        <div class="num" id="stat-done">0</div>
        <div class="lbl">Done</div>
      </div>
    </section>

    <form class="composer" id="composer" autocomplete="off">
      <input id="input" type="text" placeholder="Add a task and press Enter…" aria-label="New task" />
      <button type="submit">Add</button>
    </form>

    <nav class="filters" id="filters" aria-label="Filter tasks">
      <button data-filter="all" class="active">All</button>
      <button data-filter="open">Open</button>
      <button data-filter="done">Done</button>
      <div class="spacer"></div>
      <button class="clear" id="clear-done">Clear done</button>
    </nav>

    <ul class="list" id="list"></ul>

    <p class="hint"><kbd>Enter</kbd> to add · click text to edit · <kbd>Esc</kbd> to cancel</p>
  </main>

<script>
(() => {
  const STORE_KEY = 'todo.v1';
  const listEl = document.getElementById('list');
  const inputEl = document.getElementById('input');
  const formEl = document.getElementById('composer');
  const filtersEl = document.getElementById('filters');
  const clearBtn = document.getElementById('clear-done');
  const todayEl = document.getElementById('today');
  const sTotal = document.getElementById('stat-total');
  const sOpen = document.getElementById('stat-open');
  const sDone = document.getElementById('stat-done');

  let tasks = load();
  let filter = 'all';

  todayEl.textContent = new Date().toLocaleDateString(undefined, {
    weekday: 'short', month: 'short', day: 'numeric'
  });

  // seed example tasks on first run
  if (tasks === null) {
    tasks = [
      { id: id(), text: 'Sketch homepage layout', done: false, t: Date.now() - 3600e3 * 3 },
      { id: id(), text: 'Reply to design feedback', done: false, t: Date.now() - 3600e3 * 1 },
      { id: id(), text: 'Set up project repo', done: true, t: Date.now() - 86400e3 },
    ];
    save();
  }

  function id() { return Math.random().toString(36).slice(2, 9); }
  function load() {
    try { const v = localStorage.getItem(STORE_KEY); return v ? JSON.parse(v) : null; }
    catch { return null; }
  }
  function save() {
    localStorage.setItem(STORE_KEY, JSON.stringify(tasks));
  }

  function relTime(t) {
    const s = Math.floor((Date.now() - t) / 1000);
    if (s < 60) return 'now';
    if (s < 3600) return Math.floor(s / 60) + 'm';
    if (s < 86400) return Math.floor(s / 3600) + 'h';
    return Math.floor(s / 86400) + 'd';
  }

  function render() {
    const filtered = tasks.filter(t =>
      filter === 'all' ? true : filter === 'open' ? !t.done : t.done
    );

    listEl.innerHTML = '';
    if (filtered.length === 0) {
      const empty = document.createElement('li');
      empty.className = 'empty';
      empty.innerHTML = `
        <div class="glyph">— ${filter === 'done' ? 'Nothing done yet' : filter === 'open' ? 'All clear' : 'Empty'} —</div>
        <div class="msg">${filter === 'done' ? 'Completed tasks will appear here.' : filter === 'open' ? 'No open tasks. Time for a break.' : 'Add your first task above.'}</div>
      `;
      listEl.appendChild(empty);
    } else {
      for (const t of filtered) listEl.appendChild(renderTask(t));
    }

    sTotal.textContent = tasks.length;
    sOpen.textContent = tasks.filter(x => !x.done).length;
    sDone.textContent = tasks.filter(x => x.done).length;
  }

  function renderTask(t) {
    const li = document.createElement('li');
    li.className = 'task' + (t.done ? ' done' : '');
    li.dataset.id = t.id;

    const cb = document.createElement('input');
    cb.type = 'checkbox';
    cb.className = 'check';
    cb.checked = t.done;
    cb.setAttribute('aria-label', 'Toggle ' + t.text);
    cb.addEventListener('change', () => {
      t.done = cb.checked;
      save();
      render();
    });

    const txt = document.createElement('div');
    txt.className = 'text';
    txt.textContent = t.text;
    txt.title = 'Click to edit';
    txt.addEventListener('click', () => editTask(li, t, txt));

    const meta = document.createElement('div');
    meta.className = 'meta';
    meta.textContent = relTime(t.t);

    const del = document.createElement('button');
    del.className = 'delete';
    del.setAttribute('aria-label', 'Delete');
    del.innerHTML = '<svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M3 3l8 8M11 3l-8 8"/></svg>';
    del.addEventListener('click', () => {
      tasks = tasks.filter(x => x.id !== t.id);
      save();
      render();
    });

    li.append(cb, txt, meta, del);
    return li;
  }

  function editTask(li, t, txt) {
    if (t.done) return;
    txt.contentEditable = 'true';
    txt.focus();
    const range = document.createRange();
    range.selectNodeContents(txt);
    const sel = window.getSelection();
    sel.removeAllRanges();
    sel.addRange(range);

    const original = t.text;
    const finish = (commit) => {
      txt.contentEditable = 'false';
      const v = txt.textContent.trim();
      if (commit && v) {
        t.text = v;
        save();
      } else {
        txt.textContent = original;
      }
      txt.removeEventListener('blur', onBlur);
      txt.removeEventListener('keydown', onKey);
    };
    const onBlur = () => finish(true);
    const onKey = (e) => {
      if (e.key === 'Enter') { e.preventDefault(); finish(true); txt.blur(); }
      else if (e.key === 'Escape') { e.preventDefault(); finish(false); txt.blur(); }
    };
    txt.addEventListener('blur', onBlur);
    txt.addEventListener('keydown', onKey);
  }

  formEl.addEventListener('submit', (e) => {
    e.preventDefault();
    const v = inputEl.value.trim();
    if (!v) return;
    tasks.unshift({ id: id(), text: v, done: false, t: Date.now() });
    inputEl.value = '';
    save();
    render();
  });

  filtersEl.addEventListener('click', (e) => {
    const btn = e.target.closest('button[data-filter]');
    if (!btn) return;
    filter = btn.dataset.filter;
    filtersEl.querySelectorAll('button[data-filter]').forEach(b => {
      b.classList.toggle('active', b.dataset.filter === filter);
    });
    render();
  });

  clearBtn.addEventListener('click', () => {
    tasks = tasks.filter(x => !x.done);
    save();
    render();
  });

  render();
})();
</script>
</body>
</html>
